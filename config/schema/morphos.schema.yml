                    label: 'H3 leading'
                  h3_weight:
                    type: integer
                    label: 'H3 weight'
              h3_font:
                type: string
                label: 'H3 font'
              h3_size:
                type: float
                label: 'H3 size'
              h3_tracking:
                type: float
                label: 'H3 tracking'
              h3_leading:
                type: float
                label: 'H3 leading'
              h3_weight:
                type: integer
                label: 'H3 weight'
              h4:
                type: mapping
                label: 'H4'
                mapping:
                  h4_font:
                    type: string
                    label: 'H4 font'
                  h4_size:
                    type: float
                    label: 'H4 size'
                  h4_tracking:
                    type: float
                    label: 'H4 tracking'
                  h4_leading:
                    type: float
                    label: 'H4 leading'
                  h4_weight:
                    type: integer
                    label: 'H4 weight'
              h4_font:
                type: string
                label: 'H4 font'
              h4_size:
                type: float
                label: 'H4 size'
              h4_tracking:
