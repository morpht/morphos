# Schema for Morphos theme settings.
# @see https://www.drupal.org/docs/drupal-apis/configuration-api/configuration-schemametadata

morphos.settings:
  type: theme_settings
  label: 'Morphos settings'
  mapping:
    morphos_settings__active_tab:
      type: string
      label: 'Active tab'
    definition:
      type: mapping
      label: 'Definition'
      mapping:
        subtheme_acknowledgement:
          type: boolean
          label: 'Sub-theme acknowledgement'
        enable:
          type: boolean
          label: 'Enable'
        skins:
          type: string
          label: 'Skins'
        default:
          type: mapping
          label: 'Default'
          mapping:
            skin:
              type: string
              label: 'Default skin'
            scheme:
              type: string
              label: 'Default scheme'
    licence:
      type: mapping
      label: 'Licence'
      mapping:
        licence_accept:
          type: boolean
          label: 'Licence accepted'
    skins:
      type: sequence
      label: 'Skins'
      sequence:
        type: mapping
        label: 'Skin'
        mapping:
          schemes:
            type: sequence
            label: 'Schemes'
            sequence:
              type: mapping
              label: 'Scheme'
              mapping:
                colors:
                  type: sequence
                  label: 'Colors'
                  sequence:
                    type: mapping
                    label: 'Color'
                    mapping:
                      base:
                        type: mapping
                        label: 'Base'
                        mapping:
                          is_dark:
                            type: boolean
                            label: 'Is dark'
                          background_base:
                            type: color_hex
                            label: 'Background base'
                          foreground_base:
                            type: color_hex
                            label: 'Foreground base'
                          link_base:
                            type: color_hex
                            label: 'Link base'
                          highlight_base:
                            type: color_hex
                            label: 'Highlight base'
                      derivatives:
                        type: mapping
                        label: 'Derivatives'
                        mapping:
                          background:
                            type: color_hex
                            label: 'Background'
                          background_strong:
                            type: color_hex
                            label: 'Background strong'
                          background_stronger:
                            type: color_hex
                            label: 'Background stronger'
                          background_weak:
                            type: color_hex
                            label: 'Background weak'
                          background_weaker:
                            type: color_hex
                            label: 'Background weaker'
                          foreground:
                            type: color_hex
                            label: 'Foreground'
                          foreground_weak:
                            type: color_hex
                            label: 'Foreground weak'
                          foreground_focus:
                            type: color_hex
                            label: 'Foreground focus'
                          link:
                            type: color_hex
                            label: 'Link'
                          link_hover:
                            type: color_hex
                            label: 'Link hover'
                          link_active:
                            type: color_hex
                            label: 'Link active'
                          link_contrast:
                            type: color_hex
                            label: 'Link contrast'
                          highlight:
                            type: color_hex
                            label: 'Highlight'
                          highlight_contrast:
                            type: color_hex
                            label: 'Highlight contrast'
          radius:
            type: mapping
            label: 'Radius'
            mapping:
              boxes:
                type: float
                label: 'Boxes'
              fields:
                type: float
                label: 'Fields'
              selectors:
                type: float
                label: 'Selectors'
          effects:
            type: mapping
            label: 'Effects'
            mapping:
              depth:
                type: boolean
                label: 'Depth'
              noise:
                type: boolean
                label: 'Noise'
          sizes:
            type: mapping
            label: 'Sizes'
            mapping:
              fields:
                type: integer
                label: 'Fields'
              selectors:
                type: integer
                label: 'Selectors'
              border-width:
                type: integer
                label: 'Border width'
          typography:
            type: mapping
            label: 'Typography'
            mapping:
              imports:
                type: string
                label: 'Imports'
              default_font:
                type: string
                label: 'Default font'
              fonts:
                type: mapping
                label: 'Fonts'
                mapping:
                  font_sans:
                    type: string
                    label: 'Font sans'
                  font_serif:
                    type: string
                    label: 'Font serif'
                  font_mono:
                    type: string
                    label: 'Font mono'
              font_sans:
                type: string
                label: 'Font sans'
              font_serif:
                type: string
                label: 'Font serif'
              font_mono:
                type: string
                label: 'Font mono'
              h1:
                type: mapping
                label: 'H1'
