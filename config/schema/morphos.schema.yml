ui_icons.icon_pack_options.phosphor:
  type: mapping
  label: 'Phosphor icon settings'
  constraints:
    FullyValidatable: ~
  mapping:
    size:
      type: integer
      label: 'Size'
    color:
      type: string
      label: 'Color'
    alt:
      type: string
      label: 'Alt text'
