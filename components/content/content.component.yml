'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Content
description: General purpose content component for adding HTML to the page and other components.
status: stable
group: Content
props:
  type: object
  properties:
    content:
      type: string
      title: Content
      description: Semantic HTML content.
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - <p>Content.</p>
    prose_size:
      type: string
      title: Prose size
      description: Select the size of prose to make it bigger or smaller.
      enum:
        - prose-sm
        - prose-base
        - prose-lg
        - prose-xl
        - prose-2xl
      meta:enum:
        prose-sm: Small
        prose-base: Base
        prose-lg: Large
        prose-xl: Extra large
        prose-2xl: Extra extra large
