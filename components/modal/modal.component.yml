'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Modal
description: A dialog overlay triggered by an action button, with configurable placement.
group: Element
status: stable
props:
  type: object
  properties:
    placement:
      type: string
      title: Placement
      description: Select the placement of the modal box on the page.
      enum:
        - modal-top
        - modal-middle
        - modal-bottom
        - modal-start
        - modal-end
      meta:enum:
        modal-top: Top
        modal-middle: Middle
        modal-bottom: Bottom
        modal-start: Start
        modal-end: End
slots:
  action_item:
    title: Action
    description: Add button item to open and close the modal.
  box_items:
    title: Box
    description: Add content items to the modal box.
libraryOverrides:
  dependencies:
    - core/drupal
    - core/once
  js:
    ../../dist/js/modal.js: { minified: true }
