'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Alert
group: Content
status: stable
props:
  type: object
  properties:
    icon:
      type: string
      title: Icon
      description: Select the icon for the alert.
      default: check-circle
      examples:
        - check-circle
    message:
      type: string
      title: Message
      description: Message to display in the alert.
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - <p>Alert message goes here.</p>
    style:
      type: string
      title: Style
      description: Select the style of the alert.
      enum:
        - alert-dash
        - alert-soft
      meta:enum:
        alert-dash: Dash
        alert-soft: Soft
    color:
      type: string
      title: Color
      description: Select the color of the alert.
      default: color--info
      enum:
        - color--info
        - color--success
        - color--error
        - color--warning
      meta:enum:
        color--info: Info
        color--success: Success
        color--error: Error
        color--warning: Warning
      examples:
        - color--info
    direction:
      type: string
      title: Direction
      description: Select the direction of the alert.
      enum:
        - alert-vertical
        - alert-horizontal
      meta:enum:
        alert-vertical: Vertical
        alert-horizontal: Horizontal
slots:
  buttons:
    title: Buttons
    description: Add button items.
libraryOverrides:
  css:
    component:
      ../../dist/css/alert.css: { minified: true }
