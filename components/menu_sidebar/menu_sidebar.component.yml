$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Menu Sidebar
description: Menu formatted as expandable format for the sidebar.
group: Content
noUi: true
props:
  type: object
  properties:
    items:
      title: Nav items
      type: array
      items:
        type: object
        properties:
          url:
            title: url
            type: ['string', 'object', 'null']
          title:
            title: title
            type: ['string', 'object', 'null']
          below:
            title: Child items
            type: array
    expand_all:
      title: Expand all menu items
      type: boolean
      default: false
    sidebar_classes:
      title: Extra classes for the sidebar menu
      type: array
      items:
        type: string
libraryOverrides:
  dependencies:
    - core/drupal
    - core/once
  js:
    menu_sidebar.js: {}
