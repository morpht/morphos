$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Card - Image
status: stable
group: Display
description: 'Displays items as an image card, helpful for eye catching elements.'
props:
  type: object
  properties:
    info:
      title: Info
      description: Info text that describes the type or category of the item.
      type: string
      examples:
        - Info
    date:
      type:
        - string
        - 'null'
      title: Date
      description: The most relevant date for the item.
      examples:
        - '13.01.2026'
    heading:
      title: Heading
      description: The heading content.
      type: string
      examples:
        - Card heading
    heading_level:
      type: number
      title: Heading level
      description: Select the heading level.
      enum: [1, 2, 3, 4, 5, 6]
      default: 3
      examples:
        - 3
    url:
      title: URL
      description: The URL of the item.
      type: string
      examples:
        - http://example.com
    summary:
      title: Summary
      description: Summary text describing the item.
      type: string
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
    image:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      description: Image depicting the item.
      type: object
