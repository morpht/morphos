$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Title
status: stable
group: Display
description: 'Displays items as a title, helpful for the most frugal of listings.'
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
      description: The heading content.
      examples:
        - Title heading
    # heading_level will get remove in morphos v1.1.
    heading_level:
      type: number
      title: (Deprecated) Heading level
      description: Select the heading level.
      enum: [1, 2, 3, 4, 5, 6]
      default: 3
      examples:
        - 3
    url:
      title: URL
      description: The URL of the item.
      type: string
      examples:
        - http://example.com
libraryOverrides:
  css:
    component:
      ../../../dist/css/title.css: { minified: true }
